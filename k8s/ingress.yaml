apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leadscore-ingress
  namespace: leadscore
spec:
  rules:
    - host: leadscore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: leadscore-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: leadscore-api
                port:
                  number: 8000
