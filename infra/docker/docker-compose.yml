version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: leadscore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/leadscore
      ENVIRONMENT: docker
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  web:
    build:
      context: ../../apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
